<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>Danh sách bài viết</h1>

    <button onclick="addPost()">Thêm mới bài post</button>

    <ul id="product-list"></ul>

    <script>
        // 1. Khai báo đường link API
        const API_URL = 'https://dummyjson.com/products';

        // Biến này để lưu trữ danh sách bài viết sau khi lấy từ API về
        let productsData = [];

        // 2. Hàm gọi API để lấy danh sách bài viết
        function getProducts() {
            // Dùng axios.get để lấy dữ liệu
            axios.get(API_URL)
                .then(function (response) {
                    // Khi thành công, dữ liệu nằm trong response.data.posts
                    productsData = response.data.products;

                    // Lấy được dữ liệu rồi thì gọi hàm hiển thị ra màn hình
                    renderProducts();
                })
                .catch(function (error) {
                    console.error("Lỗi khi lấy dữ liệu:", error);
                });
        }

        // 3. Hàm vẽ dữ liệu ra màn hình (Cập nhật giao diện)
        function renderProducts() {
            // Tìm thẻ ul có id là 'product-list' trong HTML
            const listElement = document.getElementById('product-list');

            // Xóa rỗng nội dung cũ để chuẩn bị in danh sách mới
            listElement.innerHTML = '';

            // Duyệt qua từng bài post trong mảng postsData
            productsData.forEach(function(product) {
                // Tạo ra một thẻ <li>
                const li = document.createElement('li');

                // Gắn tiêu đề bài viết và các nút chức năng vào thẻ <li>
                li.innerHTML = `
            <strong>${product.title}</strong>
            <br>
            <button onclick="viewDetail(${product.id})">Chi tiết</button>
            <button onclick="editPost(${product.id}, '${product.title}')">Sửa</button>
            <button onclick="deletePost(${product.id})">Xóa</button>
            <hr>
        `;

                // Đẩy thẻ <li> này vào trong thẻ <ul>
                listElement.appendChild(li);
            });
        }

        // 4. Các hàm chức năng đang để trống, chúng ta sẽ làm ở các bước sau
        function addProduct() { console.log("Chưa làm tính năng Thêm"); }
        function viewDetail(id) { console.log("Chưa làm tính năng Chi tiết cho ID:", id); }
        function editProduct(id, currentTitle) { console.log("Chưa làm tính năng Sửa cho ID:", id); }

        function deleteProduct(id) {
            // 1. Hiển thị hộp thoại xác nhận
            const isConfirmed = confirm("Bạn có chắc chắn muốn xóa bài viết này không?");

            // 2. Nếu người dùng bấm "OK" (Đồng ý)
            if (isConfirmed) {
                // Gọi API bằng axios.delete. Chú ý: Cần nối thêm id của bài viết vào cuối đường link
                axios.delete(`${API_URL}/${id}`)
                    .then(function (response) {
                        alert("Xóa thành công!");

                        // 3. Cập nhật lại giao diện
                        // Dùng hàm filter() để tạo ra một mảng mới, giữ lại những bài KHÔNG trùng với id vừa xóa
                        productsData = productsData.filter(function(product) {
                            return product.id !== id;
                        });

                        // Gọi lại hàm in danh sách để màn hình cập nhật lại (bài viết vừa xóa sẽ biến mất)
                        renderProducts();
                    })
                    .catch(function (error) {
                        console.error("Lỗi khi xóa:", error);
                        alert("Đã xảy ra lỗi khi xóa!");
                    });
            }
        }

        // Gọi hàm getProducts() ngay khi trang web vừa chạy lên
        getProducts();
    </script>
</body>
</html>
